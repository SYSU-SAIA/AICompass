<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
  <!-- Compass outer ring -->
  <circle cx="64" cy="64" r="42" stroke="rgba(255,255,255,0.3)" stroke-width="3" fill="none"/>
  <!-- Compass inner ring -->
  <circle cx="64" cy="64" r="36" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/>
  <!-- Needle - North -->
  <polygon points="64,18 58,62 64,58 70,62" fill="white" opacity="0.95"/>
  <!-- Needle - South -->
  <polygon points="64,110 58,66 64,70 70,66" fill="white" opacity="0.6"/>
  <!-- Needle - East -->
  <polygon points="110,64 66,58 70,64 66,70" fill="white" opacity="0.5"/>
  <!-- Needle - West -->
  <polygon points="18,64 62,58 58,64 62,70" fill="white" opacity="0.5"/>
  <!-- Center star -->
  <circle cx="64" cy="64" r="8" fill="url(#star)" opacity="0.95"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="3" fill="white"/>
  <!-- N marker -->
  <text x="64" y="14" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-weight="800" font-size="16">N</text>
</svg>
